name = "trend-catcher"
main = "src/index.tsx"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

# D1 Database — create first:
#   npx wrangler d1 create trend-catcher-db
# Copy the returned database_id here
[[d1_databases]]
binding = "DB"
database_name = "trend-catcher-db"
database_id = "7a46a8d3-0b26-4d48-bbd2-f7f3d87de58b"

# Scrape task queue
[[queues.producers]]
queue = "scrape-queue"
binding = "SCRAPE_QUEUE"

[[queues.consumers]]
queue = "scrape-queue"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

# Daily cron at UTC 1:00 AM
[triggers]
crons = ["0 1 * * *"]

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./public"

[vars]

[[send_email]]
name = "EMAIL"
remote = true

[[containers]]
max_instances = 1
class_name = "AggregatorContainer"
image = "./Dockerfile"

[[durable_objects.bindings]]
name = "AGGREGATOR_CONTAINER"
class_name = "AggregatorContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AggregatorContainer"]

# Secrets (set via `npx wrangler secret put`):
#   DEEPSEEK_API_KEY — DeepSeek API key
#   INTERNAL_SECRET  — Internal API auth token
